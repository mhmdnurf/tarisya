# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: tarisya

builds:
  - id: admin
    main: ./cmd/tarisya
    binary: tarisya
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Version={{.Version}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Commit={{.Commit}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: core
    main: ./cmd/core
    binary: tarisya-core
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Version={{.Version}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Commit={{.Commit}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: agent
    main: ./cmd/agent
    binary: tarisya-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Version={{.Version}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.Commit={{.Commit}}
        -X github.com/mhmdnurf/tarisya/internal/buildinfo.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: binaries
    ids:
      - admin
      - core
      - agent
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - packaging/systemd/tarisya-core.service
      - packaging/systemd/tarisya-agent.service
      - packaging/launchd/com.tarisya.core.plist
      - packaging/launchd/com.tarisya.agent.plist
      - packaging/launchd/run-core.sh
      - packaging/launchd/run-agent.sh

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: mhmdnurf
    name: tarisya
